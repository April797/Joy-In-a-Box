</button>

<script>

let cart = [];

function addToCart(id, name, price, image){

const item = {
id: id,
name: name,
price: price,
quantity: 1,
image: image
};

cart.push(item);

localStorage.setItem("joyCart", JSON.stringify(cart));

alert("Item added to cart");

}

</script>
